version: '3.8'

services:
  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: lessgo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lessgo-network

  # Kafka for event streaming (optional)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: lessgo-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - lessgo-network
    profiles:
      - kafka

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: lessgo-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - lessgo-network
    profiles:
      - kafka

  # RShareForm embedding service (Python / FastAPI)
  embedding-service:
    build:
      context: ./services/embedding-service
      dockerfile: Dockerfile
    container_name: lessgo-embedding-service
    ports:
      - "3010:3010"
    environment:
      - EMBEDDING_SERVICE_PORT=3010
      - DATA_DIR=/app/data/nyc_taxi
      - MODEL_DIR=/app/models
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/lessgo_db
    volumes:
      # Mount local data + model dirs so files persist across container restarts
      # and parquet files are never committed to git.
      - ./services/embedding-service/data:/app/data
      - ./services/embedding-service/models:/app/models
    depends_on:
      - postgres
    networks:
      - lessgo-network

volumes:
  redis_data:

networks:
  lessgo-network:
    driver: bridge
