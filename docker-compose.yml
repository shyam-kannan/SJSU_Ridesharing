version: '3.8'

services:
  # PostgreSQL with PostGIS extension for geospatial data
  postgres:
    image: postgis/postgis:15-3.3
    container_name: lessgo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lessgo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lessgo-network

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: lessgo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lessgo-network

  # Kafka for event streaming (optional)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: lessgo-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - lessgo-network
    profiles:
      - kafka

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: lessgo-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - lessgo-network
    profiles:
      - kafka

  # RShareForm embedding service (Python / FastAPI)
  embedding-service:
    build:
      context: ./services/embedding-service
      dockerfile: Dockerfile
    container_name: lessgo-embedding-service
    ports:
      - "3010:3010"
    environment:
      - EMBEDDING_SERVICE_PORT=3010
      - DATA_DIR=/app/data/nyc_taxi
      - MODEL_DIR=/app/models
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/lessgo_db
    volumes:
      # Mount local data + model dirs so files persist across container restarts
      # and parquet files are never committed to git.
      - ./services/embedding-service/data:/app/data
      - ./services/embedding-service/models:/app/models
    depends_on:
      - postgres
    networks:
      - lessgo-network

  # Safety Service
  safety-service:
    build:
      context: .
      dockerfile: ./services/safety-service/Dockerfile
    container_name: lessgo-safety-service
    ports:
      - "8005:8005"
    environment:
      - NODE_ENV=development
      - SAFETY_SERVICE_PORT=8005
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/lessgo_db
      - NOTIFICATION_SERVICE_URL=http://notification-service:8004
      - ROUTE_DEVIATION_THRESHOLD_METERS=50
      - SPEED_TOLERANCE_PERCENT=15
      - SPEED_ANOMALY_WINDOW_SECONDS=10
      - LOCATION_POLL_INTERVAL_SECONDS=5
    depends_on:
      - postgres
      - redis
    networks:
      - lessgo-network

volumes:
  postgres_data:
  redis_data:

networks:
  lessgo-network:
    driver: bridge
