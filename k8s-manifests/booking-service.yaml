apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: lessgo
  labels:
    app: booking-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
        tier: backend
    spec:
      enableServiceLinks: false
      containers:
      - name: booking-service
        image: gcr.io/lessgo-490819/booking-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3004
          name: http
        envFrom:
        - configMapRef:
            name: lessgo-config
        - secretRef:
            name: lessgo-secrets
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: lessgo
  labels:
    app: booking-service
spec:
  selector:
    app: booking-service
  ports:
  - protocol: TCP
    port: 3004
    targetPort: 3004
    name: http
  type: ClusterIP
