apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway-ksa
  namespace: lessgo
  annotations:
    iam.gke.io/gcp-service-account: api-gateway-gsa@lessgo-492322.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: lessgo
  labels:
    app: api-gateway
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: frontend
    spec:
      serviceAccountName: api-gateway-ksa
      enableServiceLinks: false
      containers:
      - name: api-gateway
        image: us-west1-docker.pkg.dev/lessgo-492322/microservices-images/api-gateway:${COMMIT_SHA}
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets-store
          readOnly: true
        envFrom:
        - configMapRef:
            name: lessgo-config
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store-gke.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: lessgo-secrets-provider
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: lessgo
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
    name: http
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: lessgo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: lessgo
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-gateway
