apiVersion: v1
kind: Secret
metadata:
  name: lessgo-secrets
  namespace: lessgo
type: Opaque
stringData:
  # Database connection string
  DATABASE_URL: "postgresql://user:password@host:5432/lessgo"

  # Cache (Redis)
  REDIS_URL: "redis://redis:6379"

  # JWT signing and expiry
  JWT_SECRET: "your-super-secret-jwt-signing-key-min-32-chars"
  JWT_ACCESS_EXPIRY: "15m"
  JWT_REFRESH_EXPIRY: "7d"

  # Google Maps API
  GOOGLE_MAPS_API_KEY: "AIzaSyD_your_actual_google_maps_api_key_here"

  # Stripe payment processor
  STRIPE_SECRET_KEY: "sk_test_your_stripe_secret_key_here"
  STRIPE_WEBHOOK_SECRET: "whsec_your_stripe_webhook_secret_here"

  # Email configuration (SMTP)
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: "your-email@gmail.com"
  SMTP_PASS: "your-app-specific-password"
  FROM_EMAIL: "noreply@lessgo.local"

  # AWS S3 for file storage
  AWS_ACCESS_KEY_ID: "AKIA_your_aws_access_key_here"
  AWS_SECRET_ACCESS_KEY: "your-aws-secret-access-key-here"
  AWS_S3_BUCKET: "lessgo-uploads-bucket"
  AWS_REGION: "us-east-1"
