apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service-ksa
  namespace: lessgo
  annotations:
    iam.gke.io/gcp-service-account: auth-service-gsa@lessgo-492322.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: lessgo
  labels:
    app: auth-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        tier: backend
    spec:
      serviceAccountName: auth-service-ksa
      enableServiceLinks: false
      containers:
      - name: auth-service
        image: us-west1-docker.pkg.dev/lessgo-492322/microservices-images/auth-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
        volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets-store
          readOnly: true
        envFrom:
        - configMapRef:
            name: lessgo-config
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store-gke.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: lessgo-secrets-provider
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: lessgo
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service
  ports:
  - protocol: TCP
    port: 3001
    targetPort: 3001
    name: http
  type: ClusterIP
