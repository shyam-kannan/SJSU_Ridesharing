apiVersion: v1
kind: ServiceAccount
metadata:
  name: routing-service-ksa
  namespace: lessgo
  annotations:
    iam.gke.io/gcp-service-account: routing-service-gsa@lessgo-492322.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: routing-service
  namespace: lessgo
  labels:
    app: routing-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: routing-service
  template:
    metadata:
      labels:
        app: routing-service
        tier: backend
    spec:
      serviceAccountName: routing-service-ksa
      enableServiceLinks: false
      containers:
      - name: routing-service
        image: us-west1-docker.pkg.dev/lessgo-492322/microservices-images/routing-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: lessgo-config
        - secretRef:
            name: lessgo-secrets
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: routing-service
  namespace: lessgo
  labels:
    app: routing-service
spec:
  selector:
    app: routing-service
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
